backend:
  name: github
  repo: RomRMX/josef-anolin
  branch: main
  base_url: https://YOUR-DECAP-OAUTH-PROVIDER.example.com
  auth_endpoint: auth

site_url: https://www.josefanolin.com
display_url: https://www.josefanolin.com
logo_url: /joe-logo.png
publish_mode: editorial_workflow

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site
    label: Site Content
    files:
      - name: content
        label: Website Content
        file: src/data/siteContent.json
        format: json
        fields:
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: name, label: Name, widget: string }
              - { name: tagline, label: Tagline, widget: string }
              - { name: bookLabel, label: Booking Button Label, widget: string }
              - { name: bio, label: Bio, widget: text }
          - name: contact
            label: Contact
            widget: object
            fields:
              - { name: heading, label: Heading, widget: string }
              - { name: lede, label: Intro Text, widget: text }
              - { name: email, label: Email, widget: string }
              - { name: formspreeId, label: Formspree ID, widget: string, required: false }
          - name: shows
            label: Shows
            widget: list
            summary: "{{fields.date}} - {{fields.venue}}"
            fields:
              - { name: date, label: Date, widget: string }
              - { name: city, label: City, widget: string }
              - { name: venue, label: Venue, widget: string }
              - { name: address, label: Address, widget: string, required: false }
              - { name: tickets, label: Ticket Link, widget: string, required: false }
          - name: appearances
            label: Appearances
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: Group Label, widget: string }
              - name: items
                label: Items
                widget: list
                field: { name: item, label: Item, widget: string }
          - name: videos
            label: Videos
            widget: list
            summary: "{{fields.title}} {{fields.id}}"
            fields:
              - { name: id, label: YouTube Video ID, widget: string }
              - { name: title, label: Title, widget: string, required: false }
          - name: pics
            label: Photo Gallery
            widget: list
            field: { name: image, label: Image, widget: image }
          - name: products
            label: Products
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { name: id, label: Product ID, widget: string }
              - { name: src, label: Product Image, widget: image }
              - { name: name, label: Name, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: price, label: Price in Cents, widget: number, value_type: int }
          - name: policies
            label: Store Policies
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: Title, widget: string }
              - { name: body, label: Body, widget: text }
          - name: socials
            label: Social Links
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: URL, widget: string }
              - name: icon
                label: Icon
                widget: select
                options: [youtube, instagram, tiktok, facebook, threads, email]
